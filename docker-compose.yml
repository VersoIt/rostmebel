services:
  postgres:
    image: postgres:16-alpine
    container_name: rostmebel_db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: rostmebel
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d rostmebel"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rostmebel_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: rostmebel_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - PORT=8080
      - ENV=production
      - DATABASE_URL=postgres://user:password@postgres:5432/rostmebel?sslmode=disable
      - REDIS_URL=redis:6379
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash}
      - GEMINI_FALLBACK_MODELS=${GEMINI_FALLBACK_MODELS:-gemini-2.5-flash-lite}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - ADMIN_USERNAME=${ADMIN_USERNAME:?ADMIN_USERNAME is required}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      - ORDER_LIMIT_ENABLED=${ORDER_LIMIT_ENABLED:-true}
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - OUTBOUND_PROXY_SCHEME=${OUTBOUND_PROXY_SCHEME:-http}
      - OUTBOUND_PROXY_HOST=${OUTBOUND_PROXY_HOST:-}
      - OUTBOUND_PROXY_PORT=${OUTBOUND_PROXY_PORT:-}
      - OUTBOUND_PROXY_USERNAME=${OUTBOUND_PROXY_USERNAME:-}
      - OUTBOUND_PROXY_PASSWORD=${OUTBOUND_PROXY_PASSWORD:-}
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/readyz >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    container_name: rostmebel_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - uploads_data:/var/www/uploads:ro
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  uploads_data:
