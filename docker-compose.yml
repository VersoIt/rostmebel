services:
  postgres:
    image: postgres:16-alpine
    container_name: rostmebel_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: rostmebel
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d rostmebel"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rostmebel_redis
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  backend:
    build: ./backend
    container_name: rostmebel_backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - PORT=8080
      - ENV=production
      - DATABASE_URL=postgres://user:password@postgres:5432/rostmebel?sslmode=disable
      - REDIS_URL=redis:6379
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ORDER_LIMIT_ENABLED=${ORDER_LIMIT_ENABLED}
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "8081:8080"

  frontend:
    build: ./frontend
    container_name: rostmebel_frontend
    depends_on:
      - backend
    volumes:
      - uploads_data:/var/www/uploads:ro
    ports:
      - "4322:80"

volumes:
  postgres_data:
  redis_data:
  uploads_data:
