name: Deploy to VPS

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Test backend
        working-directory: backend
        run: go test ./...

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Validate compose config
        env:
          GEMINI_API_KEY: ""
          GEMINI_MODEL: gemini-2.5-flash
          GEMINI_FALLBACK_MODELS: gemini-2.5-flash-lite
          JWT_SECRET: 0123456789abcdef0123456789abcdef
          ADMIN_USERNAME: ci-admin
          ADMIN_PASSWORD: ci-password
          OUTBOUND_PROXY_HOST: ""
          OUTBOUND_PROXY_PORT: ""
        run: docker compose config --quiet

  deploy:
    runs-on: ubuntu-latest
    needs: preflight
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            set -eu

            PROJECT_DIR="${{ secrets.PROJECT_PATH }}"
            cd "$PROJECT_DIR"

            if [ ! -d .git ]; then
              echo "PROJECT_PATH is not a Git repository: $PROJECT_DIR"
              exit 1
            fi

            if ! touch .git/.deploy-write-test 2>/dev/null; then
              echo "Deploy user $(id -un) cannot write to $PROJECT_DIR/.git. Trying to repair ownership with sudo."
              if command -v sudo >/dev/null 2>&1 && sudo -n true 2>/dev/null; then
                sudo -n chown -R "$(id -u):$(id -g)" "$PROJECT_DIR"
              else
                echo "Cannot repair permissions automatically."
                echo "Run this once on the VPS:"
                echo "sudo chown -R $(id -un):$(id -gn) $PROJECT_DIR"
                exit 1
              fi
            fi

            touch .git/.deploy-write-test
            rm -f .git/.deploy-write-test

            git pull --ff-only origin main
            docker compose up --build -d

            docker compose ps
            docker compose exec -T backend wget -qO- http://localhost:8080/readyz >/dev/null
            docker compose exec -T frontend wget -qO- http://127.0.0.1/healthz >/dev/null

            docker image prune -f
